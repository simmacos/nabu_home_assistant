services:
  faster-whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: faster-whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    command: --model large-v3-turbo --language it --beam-size 1 --compute-type int8 --cpu-threads 12
    volumes:
      - ./whisper/data:/data

  piper-tts:
    image: rhasspy/wyoming-piper:latest
    container_name: piper-tts
    restart: unless-stopped
    ports:
      - "10200:10200"
    command: --voice it_IT-riccardo-x_low
    volumes:
      - ./piper/data:/data